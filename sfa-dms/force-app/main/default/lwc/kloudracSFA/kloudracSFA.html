<template>
    <div class="container">

        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="logo-container">
                <div class="company-logo">🚀 Kloudrac</div>
                <div class="tagline">Field Force Excellence</div>
            </div>

            <nav class="nav-tabs">
                <template for:each={tabs} for:item="tab">
                    <div key={tab.id} class="nav-tab" onclick={handleTabClick} data-id={tab.id}>
                        <span class="tab-icon">{tab.icon}</span>
                        <span class="tab-label">{tab.label}</span>
                        <span class="indicator"></span>
                    </div>
                </template>
            </nav>

            <div class="user-profile">
                <div class="avatar">👨‍💼</div>
                <div class="user-info">
                    <div class="user-name">{userName}</div>
                    <div class="user-role">{userRole}</div>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <template if:true={isDashboardActive}>
                <c-sfa-dashboard onnavigate={handleChildNavigate}></c-sfa-dashboard>
            </template>
            <template if:true={isAttendanceActive}>
                <c-sfa-attendance></c-sfa-attendance>
            </template>
            <template if:true={isJourneyPlanActive}>
                <c-sfa-journey-plan></c-sfa-journey-plan>
            </template>
            <template if:true={isVisitExecutionActive}>
                <c-sfa-visit-execution></c-sfa-visit-execution>
            </template>
            <template if:true={isExpensesActive}>
                <c-sfa-expenses></c-sfa-expenses>
            </template>
            <template if:true={isNewAccountActive}>
                <c-sfa-new-account></c-sfa-new-account>
            </template>
            <template if:true={isAiAnalyticsActive}>
                <c-sfa-ai-analytics></c-sfa-ai-analytics>
            </template>
            <template if:true={isAccount360Active}>
                <c-sfa-account360-module onaccountselect={handleAccountSelect}></c-sfa-account360-module>
            </template>
            <template if:true={isPrimaryOrdersActive}>
                <c-sfa-primary-orders></c-sfa-primary-orders>
            </template>
        </div>

        <!-- Mobile Bottom Nav Bar (all 9 tabs in horizontally scrollable row) -->
        <nav class="mobile-nav-bar">
            <template for:each={tabs} for:item="tab">
                <button key={tab.id} class={tab.mobileNavClass} data-id={tab.id} onclick={handleTabClick}>
                    <span class="mnav-icon">{tab.icon}</span>
                    <span class="mnav-label">{tab.shortLabel}</span>
                </button>
            </template>
        </nav>

    </div><!-- end container -->
</template>
