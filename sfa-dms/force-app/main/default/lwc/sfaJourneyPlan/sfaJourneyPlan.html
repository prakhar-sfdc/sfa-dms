<template>
    <div class="jp-container">

        <!-- ── Header ─────────────────────────────────────────── -->
        <div class="jp-header">
            <div class="header-left">
                <h1>Journey Plan (PJP)</h1>
                <p class="subtitle">Plan, upload and execute your route</p>
            </div>
            <div class="header-right">
                <div class="date-picker">
                    <button class="date-btn" onclick={toggleCalendar}>
                        <span class="cal-icon">🗓</span> {selectedDateDisplay}
                    </button>
                    <template if:true={showCalendar}>
                        <div class="cal-popup" onclick={stopProp}>
                            <div class="cal-popup-header">
                                <button class="cal-nav" onclick={calPrevMonth}>‹</button>
                                <span class="cal-popup-title">{calPopupLabel}</span>
                                <button class="cal-nav" onclick={calNextMonth}>›</button>
                            </div>
                            <div class="cal-weekdays">
                                <template for:each={weekdayLabels} for:item="w">
                                    <span key={w} class="cal-wd">{w}</span>
                                </template>
                            </div>
                            <div class="cal-grid">
                                <template for:each={calendarDays} for:item="c">
                                    <template if:true={c.blank}>
                                        <span key={c.key} class="cal-day blank"></span>
                                    </template>
                                    <template if:false={c.blank}>
                                        <button key={c.key} class={c.cls} data-date={c.iso} onclick={selectCalDay}>
                                            <span class="cal-num">{c.dayNum}</span>
                                            <template if:true={c.hasVisits}>
                                                <span class="cal-badge">{c.count}</span>
                                            </template>
                                        </button>
                                    </template>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
                <button class="secondary-btn" onclick={openUpload}>⤓ Upload PJP</button>
                <div class="view-switch">
                    <button class={dayBtnClass} data-view="day" onclick={changeView}>Day</button>
                    <button class={weekBtnClass} data-view="week" onclick={changeView}>Week</button>
                    <button class={monthBtnClass} data-view="month" onclick={changeView}>Month</button>
                </div>
            </div>
        </div>

        <!-- ══════════════════════ DAY VIEW ══════════════════════ -->
        <template if:true={isDayView}>
            <!-- Metric strip -->
            <div class="metrics-grid">
                <div class="metric-card m-planned">
                    <div class="metric-title">Planned</div>
                    <div class="metric-value">{plannedCount}</div>
                </div>
                <div class="metric-card m-completed">
                    <div class="metric-title">Completed</div>
                    <div class="metric-value">{completedCount}</div>
                </div>
                <div class="metric-card m-pending">
                    <div class="metric-title">Pending</div>
                    <div class="metric-value">{pendingCount}</div>
                </div>
                <div class="metric-card m-success">
                    <div class="metric-title">Success Rate</div>
                    <div class="metric-value">{successRate}%</div>
                </div>
                <div class="metric-card m-distance">
                    <div class="metric-title">Route Distance</div>
                    <div class="metric-value sm">{totalDistanceDisplay}</div>
                </div>
                <div class="metric-card m-onsite">
                    <div class="metric-title">On-site / Travel</div>
                    <div class="metric-value sm">{onSiteDisplay} · {travelTimeDisplay}</div>
                </div>
            </div>

            <!-- Progress -->
            <div class="progress-card">
                <div class="progress-head">
                    <span class="progress-label">Route Progress</span>
                    <span class="progress-count">{completedCount}/{plannedCount} visits</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style={progressWidth}></div></div>
            </div>

            <!-- Visit list -->
            <div class="list-card">
                <div class="card-header">
                    <h3>Visits — {selectedDateDisplay}</h3>
                    <button class="primary-btn" onclick={openAddVisit}>+ Add Visit</button>
                </div>

                <template if:true={isLoading}>
                    <div class="loading-state">Loading plan…</div>
                </template>

                <template if:false={isLoading}>
                    <template if:false={hasItems}>
                        <div class="empty-state">
                            <div class="empty-icon">🗺</div>
                            <p>No visits planned for this day.</p>
                            <button class="primary-btn" onclick={openAddVisit}>Schedule a Visit</button>
                        </div>
                    </template>

                    <template if:true={hasItems}>
                        <div class="visit-list">
                            <template for:each={dayItems} for:item="v">
                                <div key={v.id} class="visit-row">
                                    <div class="v-seq">{v.seq}</div>
                                    <div class="v-main">
                                        <div class="v-line1">
                                            <span class="v-account">{v.accountName}</span>
                                            <span class={v.priorityClass}>{v.priority}</span>
                                            <span class={v.statusClass}>{v.status}</span>
                                        </div>
                                        <div class="v-line2">
                                            <span class="v-meta">🕐 {v.plannedTime}</span>
                                            <span class="v-meta">📍 {v.location}</span>
                                            <span class="v-meta">{v.purpose}</span>
                                        </div>
                                        <template if:true={v.showRoute}>
                                            <div class="v-route">
                                                <span class="route-chip">Distance {v.distanceDisplay}</span>
                                                <span class="route-chip">Travel {v.travelDisplay}</span>
                                                <span class="route-chip">On-site {v.durationDisplay}</span>
                                            </div>
                                        </template>
                                    </div>
                                    <div class="v-actions">
                                        <button class="icon-btn" data-id={v.id} onclick={moveUp} title="Move up">↑</button>
                                        <button class="icon-btn" data-id={v.id} onclick={moveDown} title="Move down">↓</button>
                                        <button class="icon-btn danger" data-id={v.id} onclick={removeVisit} title="Remove">✕</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </template>
            </div>
        </template>

        <!-- ══════════════════════ WEEK VIEW ══════════════════════ -->
        <template if:true={isWeekView}>
            <div class="week-header">
                <button class="nav-btn" onclick={prevWeek}>‹</button>
                <div class="week-title">
                    <h3>Week Overview</h3>
                    <span class="week-range">{weekRange}</span>
                </div>
                <button class="nav-btn" onclick={nextWeek}>›</button>
            </div>
            <div class="week-stats">
                <div class="wk-stat"><span class="wk-num">{weekPlannedTotal}</span><span class="wk-lbl">Planned</span></div>
                <div class="wk-stat"><span class="wk-num">{weekCompletedTotal}</span><span class="wk-lbl">Completed</span></div>
                <div class="wk-stat"><span class="wk-num">{weekDistanceTotal}</span><span class="wk-lbl">Distance</span></div>
            </div>
            <div class="week-grid">
                <template for:each={weekDays} for:item="w">
                    <button key={w.dateStr} class={w.cardClass} data-date={w.dateStr} onclick={selectWeekDay}>
                        <div class="wk-day">{w.dayName}</div>
                        <div class="wk-date">{w.dateLabel}</div>
                        <div class="wk-visits">{w.planned} visits</div>
                        <div class="wk-done">{w.completed} done</div>
                        <div class="wk-dist">{w.distanceDisplay}</div>
                    </button>
                </template>
            </div>
        </template>

        <!-- ══════════════════════ MONTH VIEW ══════════════════════ -->
        <template if:true={isMonthView}>
            <div class="month-header">
                <button class="nav-btn" onclick={prevMonth}>‹</button>
                <div class="month-title">
                    <h3>{calLabel}</h3>
                    <span class="month-sub">{monthPlannedTotal} visits · {monthActiveDays} active days</span>
                </div>
                <button class="nav-btn" onclick={nextMonth}>›</button>
            </div>
            <div class="month-weekdays">
                <template for:each={weekdayLabels} for:item="w">
                    <span key={w} class="mwd">{w}</span>
                </template>
            </div>
            <div class="month-grid">
                <template for:each={monthCells} for:item="c">
                    <template if:true={c.blank}>
                        <span key={c.key} class="month-day blank"></span>
                    </template>
                    <template if:false={c.blank}>
                        <button key={c.key} class={c.cellClass} data-date={c.iso} onclick={selectMonthDay}>
                            <div class="md-top">
                                <span class="md-num">{c.dayNum}</span>
                                <template if:true={c.hasVisits}>
                                    <span class="md-badge">{c.planned}</span>
                                </template>
                            </div>
                            <div class="md-events">
                                <template for:each={c.events} for:item="ev">
                                    <span key={ev.key} class="md-event">{ev.text}</span>
                                </template>
                            </div>
                        </button>
                    </template>
                </template>
            </div>
        </template>

        <!-- ══════════════════════ UPLOAD MODAL ══════════════════════ -->
        <template if:true={showUpload}>
            <div class="modal-overlay" onclick={closeUpload}>
                <div class="modal-box" onclick={stopProp}>
                    <div class="modal-header">
                        <h2>Upload PJP Plan</h2>
                        <button class="modal-close" onclick={closeUpload}>×</button>
                    </div>
                    <div class="modal-body">
                        <p class="upload-help">Upload a CSV with columns:
                            <code>Account, Date, Time, Purpose, Priority</code>.
                            Dates as <code>YYYY-MM-DD</code>, times as <code>HH:mm</code>. Accounts are matched by name.</p>
                        <label class="file-drop">
                            <input type="file" accept=".csv" onchange={handleFile} />
                            <span class="file-drop-text">Click to choose a .csv file</span>
                        </label>
                        <template if:true={isUploading}>
                            <div class="loading-state">Importing…</div>
                        </template>
                        <template if:true={uploadResult}>
                            <div class="upload-summary">
                                <div class="us-item"><span class="us-num">{uploadResult.itemsCreated}</span><span class="us-lbl">Imported</span></div>
                                <div class="us-item"><span class="us-num">{uploadResult.plansCreated}</span><span class="us-lbl">Plans</span></div>
                                <div class="us-item"><span class="us-num">{uploadResult.rowsSkipped}</span><span class="us-lbl">Skipped</span></div>
                            </div>
                            <template if:true={hasUploadErrors}>
                                <div class="upload-errors">
                                    <template for:each={uploadErrors} for:item="er">
                                        <div key={er.key} class="err-line">{er.text}</div>
                                    </template>
                                </div>
                            </template>
                        </template>
                    </div>
                    <div class="modal-footer">
                        <button class="secondary-btn" onclick={closeUpload}>Close</button>
                    </div>
                </div>
            </div>
        </template>

        <!-- ══════════════════════ ADD VISIT MODAL (builder) ══════════════════════ -->
        <template if:true={showAddVisit}>
            <div class="modal-overlay" onclick={closeAddVisit}>
                <div class="modal-box" onclick={stopProp}>
                    <div class="modal-header">
                        <h2>Add Visit — {selectedDateDisplay}</h2>
                        <button class="modal-close" onclick={closeAddVisit}>×</button>
                    </div>
                    <div class="modal-body">
                        <div class="field">
                            <label class="field-label">Account</label>
                            <template if:false={selectedAccount}>
                                <input type="text" class="text-input" placeholder="Search accounts…" oninput={handleAccountSearch} />
                                <template if:true={hasAccountResults}>
                                    <div class="account-results">
                                        <template for:each={accountResults} for:item="a">
                                            <button key={a.id} class="account-option" data-id={a.id} onclick={selectAccount}>
                                                <span class="ao-name">{a.name}</span>
                                                <span class="ao-loc">{a.location}</span>
                                            </button>
                                        </template>
                                    </div>
                                </template>
                            </template>
                            <template if:true={selectedAccount}>
                                <div class="selected-account">
                                    <span>{selectedAccount.name}</span>
                                    <button class="link-btn" onclick={clearAccount}>Change</button>
                                </div>
                            </template>
                        </div>

                        <div class="field-row">
                            <div class="field">
                                <label class="field-label">Planned Time</label>
                                <input type="time" class="text-input" value={addTime} onchange={handleTime} />
                            </div>
                            <div class="field">
                                <lightning-combobox label="Priority" value={addPriority}
                                    options={priorityOptions} onchange={handlePriority}></lightning-combobox>
                            </div>
                        </div>
                        <div class="field">
                            <lightning-combobox label="Purpose" value={addPurpose}
                                options={purposeOptions} onchange={handlePurpose}></lightning-combobox>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="secondary-btn" onclick={closeAddVisit}>Cancel</button>
                        <button class="primary-btn" onclick={submitAddVisit} disabled={isSaving}>Add to Plan</button>
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
