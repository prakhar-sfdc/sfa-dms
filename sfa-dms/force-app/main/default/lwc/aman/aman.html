                                <h4>Detailed Schedule</h4>
                                <div class="week-schedule">
                                    <template for:each={weekSchedule} for:item="visit">
                                        <div key={visit.id} class="schedule-item">
                                            <div class="schedule-day">{visit.day}</div>
                                            <div class="schedule-time">{visit.time}</div>
                                            <div class="schedule-account">{visit.account}</div>
                                            <div class="schedule-purpose">{visit.purpose}</div>
                                            <div class={visit.statusClass}>{visit.status}</div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Month View -->
                    <template if:true={isMonthView}>
                        <div class="month-view">
                            <div class="month-header">
                                <h3>{calendarMonth} {calendarYear}</h3>
                                <div class="month-stats">
                                    <span class="stat">📅 {monthSummary.totalDays} days</span>
                                    <span class="stat">📍 {monthSummary.totalVisits} visits</span>
                                    <span class="stat">🏢 {monthSummary.totalAccounts} accounts</span>
                                </div>
                            </div>
                            <div class="month-grid">
                                <div class="month-weekdays">
                                    <div class="weekday">Sun</div>
                                    <div class="weekday">Mon</div>
                                    <div class="weekday">Tue</div>
                                    <div class="weekday">Wed</div>
                                    <div class="weekday">Thu</div>
                                    <div class="weekday">Fri</div>
                                    <div class="weekday">Sat</div>
                                </div>
                                <template for:each={monthDays} for:item="day">
                                    <div key={day.id} class="month-day" data-date={day.date}>
                                        <div class="day-header">
                                            <span class="day-number">{day.day}</span>
                                            <template if:true={day.hasVisits}>
                                                <span class="day-visits">{day.visits}</span>
                                            </template>
                                        </div>
                                        <template if:true={day.events}>
                                            <div class="day-events">
                                                <template for:each={day.events} for:item="event">
                                                    <div key={event.id} class="day-event">
                                                        {event.time} - {event.account}
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                            <div class="month-legend">
                                <div class="legend-item">
                                    <div class="legend-color today"></div>
                                    <span>Today</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color has-visits"></div>
                                    <span>Has Visits</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color priority"></div>
                                    <span>Priority</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>




            <!-- Expenses Tab Content -->
            <template if:true={isExpensesActive}>
                <div class="expenses-container">
                    <!-- Header Section -->
                    <div class="expense-header">
                        <div class="header-left">
                            <h1>Expense Management</h1>
                            <p class="subtitle">Track and manage your expenses</p>
                        </div>
                        <div class="header-right">
                            <button class="primary-btn expense-submit-btn" onclick={handleSubmitExpense}>
                    Submit Expense
                </button>
                        </div>
                    </div>

                    <!-- Summary Cards -->
                    <div class="summary-cards">
                        <div class="summary-card">
                            <div class="summary-icon">💰</div>
                            <div class="summary-content">
                                <h3>Total Expenses</h3>
                                <div class="summary-value">₹{expenseSummary.totalAmount}</div>
                                <div class="summary-trend">All time total</div>
                            </div>
                        </div>

                        <div class="summary-card">
                            <div class="summary-icon">✅</div>
                            <div class="summary-content">
                                <h3>Approved</h3>
                                <div class="summary-value">{expenseSummary.approvedCount}</div>
                                <div class="summary-trend">Expenses approved</div>
                            </div>
                        </div>

                        <div class="summary-card">
                            <div class="summary-icon">⏳</div>
                            <div class="summary-content">
                                <h3>Pending</h3>
                                <div class="summary-value">{expenseSummary.pendingCount}</div>
                                <div class="summary-trend">Awaiting approval</div>
                            </div>
                        </div>

                        <div class="summary-card">
                            <div class="summary-icon">📋</div>
                            <div class="summary-content">
                                <h3>Submissions</h3>
                                <div class="summary-value">{expenseSummary.totalSubmissions}</div>
                                <div class="summary-trend">Total submitted</div>
                            </div>
                        </div>
                    </div>

                    <!-- Middle Section - Two Cards Inline -->
                    <div class="middle-cards-expenses">
                        <!-- Budget Compliance Card -->
                        <div class="budget-card">
                            <div class="card-header">
                                <h3>📊 Budget Compliance</h3>
                                <div class={budgetStatusClass}>
                                    {budget.status}
                                </div>

                            </div>
                            <div class="budget-progress">
                                <div class="progress-bar">
                                    <div class="progress-fill" style={budgetProgressWidth}></div>
                                </div>
                                <div class="progress-label">{budgetPercentageText}</div>
                            </div>
                            <div class="budget-details">
                                <div class="budget-item">
                                    <span class="budget-label">Used</span>
                                    <span class="budget-value">₹{budget.used}</span>
                                </div>
                                <div class="budget-item">
                                    <span class="budget-label">Total</span>
                                    <span class="budget-value">₹{budget.total}</span>
                                </div>
                                <div class="budget-item">
                                    <span class="budget-label">Remaining</span>
                                    <span class="budget-value">₹{budget.remaining}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Expenses by Type Card -->
                        <div class="expense-type-card">
                            <div class="card-header">
                                <h3>📈 Expenses by Type</h3>
                            </div>
                            <div class="type-chart">
                                <div class="chart-bars">
                                    <!-- Using if:true for each expense type -->
                                    <template if:true={hasTravelExpenses}>
                                        <div class="chart-bar-item">
                                            <div class="bar-label">Travel</div>
                                            <div class="bar-container">
                                                <div class="bar" style={travelBarStyle}></div>
                                            </div>
                                            <div class="bar-value">₹{travelAmount}</div>
                                        </div>
                                    </template>

                                    <template if:true={hasFoodExpenses}>
                                        <div class="chart-bar-item">
                                            <div class="bar-label">Food</div>
                                            <div class="bar-container">
                                                <div class="bar" style={foodBarStyle}></div>
                                            </div>
                                            <div class="bar-value">₹{foodAmount}</div>
                                        </div>
                                    </template>

                                    <template if:true={hasStayExpenses}>
                                        <div class="chart-bar-item">
                                            <div class="bar-label">Stay</div>
                                            <div class="bar-container">
                                                <div class="bar" style={stayBarStyle}></div>
                                            </div>
                                            <div class="bar-value">₹{stayAmount}</div>
                                        </div>
                                    </template>

                                    <template if:true={hasMiscExpenses}>
                                        <div class="chart-bar-item">
                                            <div class="bar-label">Misc</div>
                                            <div class="bar-container">
                                                <div class="bar" style={miscBarStyle}></div>
                                            </div>
                                            <div class="bar-value">₹{miscAmount}</div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                            <div class="type-legend">
                                <div class="legend-item">
                                    <div class="legend-color travel-color"></div>
                                    <span class="legend-label">Travel</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color food-color"></div>
                                    <span class="legend-label">Food</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color stay-color"></div>
                                    <span class="legend-label">Stay</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color misc-color"></div>
                                    <span class="legend-label">Misc</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom Section - Recent Expenses -->

                    <div class="recent-expenses-card">
                        <div class="card-header">
                            <h3>📋 Recent Expenses</h3>
                            <button class="view-all-btn" onclick={viewAllExpenses}>View All →</button>
                        </div>
                        <div class="expenses-table">
                            <div class="table-header">
                                <div class="table-cell">Date</div>
                                <div class="table-cell">Expense Type</div>
                                <div class="table-cell">Description</div>
                                <div class="table-cell">Amount</div>
                                <div class="table-cell">Status</div>
                                <div class="table-cell">Submitted By</div>
                                <div class="table-cell">Actions</div>
                            </div>
                            <div class="table-body">
                                <template for:each={recentExpensesList} for:item="expense">
                                    <div key={expense.id} class="table-row">
                                        <div class="table-cell">{expense.formattedDate}</div>
                                        <div class="table-cell">
                                            <span class={expense.typeBadgeClass}>
                                    {expense.type}
                                </span>
                                        </div>
                                        <div class="table-cell">{expense.description}</div>
                                        <div class="table-cell">₹{expense.amount}</div>
                                        <div class="table-cell">
                                            <span class={expense.statusClass}>{expense.status}</span>
                                        </div>
                                        <div class="table-cell">{expense.submittedBy}</div>
                                        <div class="table-cell">
                                            <button class="action-btn small" onclick={handleViewExpenseDetails} data-id={expense.id}>
                                    View
                                </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Submit Expense Modal -->
                <template if:true={showExpenseSubmitModal}>
                    <div class="modal-overlay" onclick={closeExpenseSubmitModal}>
                        <div class="attendance-modal" onclick={handleModalClick}>

                            <div class="modal-header">
                                <h2>💰 Submit Expense</h2>
                                <button class="modal-close" onclick={closeExpenseSubmitModal}>×</button>
                            </div>

                            <div class="modal-content" style="display:block; padding: 24px 32px;">
                                <lightning-record-edit-form object-api-name="Expense__c"
                                    onsuccess={handleExpenseSubmitSuccess} onerror={handleExpenseSubmitError}>

                                    <lightning-messages></lightning-messages>

                                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                                        <div>
                                            <lightning-input-field field-name="Expense_Date__c">
                                            </lightning-input-field>
                                        </div>
                                        <div>
                                            <lightning-input-field field-name="Expense_Type__c">
                                            </lightning-input-field>
                                        </div>
                                        <div>
                                            <lightning-input-field field-name="Amount__c">
                                            </lightning-input-field>
                                        </div>
                                        <div>
                                            <lightning-input-field field-name="Expense_Source__c">
                                            </lightning-input-field>
                                        </div>
                                        <div>
                                            <lightning-input-field field-name="Visit__c">
                                            </lightning-input-field>
                                        </div>
                                        <div>
                                            <lightning-input-field field-name="City__c">
                                            </lightning-input-field>
                                        </div>
                                        <div style="grid-column: 1 / -1;">
                                            <lightning-input-field field-name="Description__c">
                                            </lightning-input-field>
                                        </div>
                                    </div>

                                    <div class="slds-m-top_medium"
                                        style="display:flex; gap:12px; justify-content:flex-end; margin-top:24px; padding-top:16px; border-top:1px solid #dddbda;">
                                        <button class="secondary-btn" type="button" onclick={closeExpenseSubmitModal}>
                            Cancel
                        </button>
                                        <lightning-button type="submit" label="Submit Expense" variant="brand">
                                        </lightning-button>
                                    </div>

                                </lightning-record-edit-form>
                            </div>

                        </div>
                    </div>
                </template>
            </template>

            <!-- Visit Execution Tab Content -->
            <template if:true={isVisitExecutionActive}>

                <!-- ── DETAIL VIEW (replaces list when a visit is active) ──── -->
                <template if:true={activeVisitId}>
                    <c-visit-detail-view visit-id={activeVisitId} check-in-time={activeVisitCheckInTime}
                        check-in-lat={activeVisitLat} check-in-lng={activeVisitLng}
                        check-in-address={activeVisitAddress} onback={handleVisitDetailBack}
                        oncheckout={handleVisitCheckOutEvent}>
                    </c-visit-detail-view>
                </template>

                <!-- ── LIST VIEW (default — shown when no active visit) ─────── -->
                <template if:false={activeVisitId}>
                    <div class="visit-execution-container">

                        <!-- Header -->
                        <div class="journey-header">
                            <div class="header-left">
                                <h1>Visit Execution</h1>
                                <p class="subtitle">Check in to your planned visits for today</p>
                            </div>
                            <div class="header-right">
                                <button class="primary-btn" onclick={openCreateVisitFromExecution}>
                        ➕ Create New Visit
                    </button>
                            </div>
                        </div>

                        <!-- Date Carousel -->
                        <div class="date-carousel">
                            <button class="carousel-btn" onclick={prevDate}>←</button>
                            <div class="carousel-dates">
                                <template for:each={carouselDates} for:item="dateItem">
                                    <div key={dateItem.id} class="carousel-date" data-date={dateItem.id}
                                        onclick={handleExecutionDateClick}>
                                        <div class="carousel-day">{dateItem.dayName}</div>
                                        <div class="carousel-date-num">{dateItem.dateNum}</div>
                                        <div class="carousel-month">{dateItem.month}</div>
                                        <div class="carousel-visits">{dateItem.visits} visits</div>
                                    </div>
                                </template>
                            </div>
                            <button class="carousel-btn" onclick={nextDate}>→</button>
                        </div>

                        <!-- Today's Visit List Card -->
                        <div class="ve-visit-list-card">
                            <div class="ve-list-header">
                                <div class="ve-list-title">
                                    <span>📅 Visits — {selectedDateDisplay}</span>
                                    <span class="count-badge-sm">{dailyVisits.length}</span>
                                </div>
                                <button class="add-btn" onclick={openCreateVisitFromExecution}>+ Add Visit</button>
                            </div>

                            <!-- No visits state -->
                            <template if:false={dailyVisits.length}>
                                <div class="ve-empty">
                                    <div class="ve-empty-icon">📋</div>
                                    <div class="ve-empty-title">No visits planned for this date</div>
                                    <button class="primary-btn" onclick={openCreateVisitFromExecution}>
                            Schedule a Visit
                        </button>
                                </div>
                            </template>

                            <!-- Visit rows -->
                            <template if:true={dailyVisits.length}>
                                <div class="ve-visit-rows">

                                    <!-- Table header -->
                                    <div class="ve-row ve-row--header">
                                        <div class="ve-col ve-col-time">Time</div>
                                        <div class="ve-col ve-col-account">Account</div>
                                        <div class="ve-col ve-col-purpose">Purpose</div>
                                        <div class="ve-col ve-col-status">Status</div>
                                        <div class="ve-col ve-col-action">Action</div>
                                    </div>

                                    <template for:each={dailyVisitsWithMeta} for:item="visit">
                                        <div key={visit.id} class="ve-row ve-row--data">

                                            <!-- Time -->
                                            <div class="ve-col ve-col-time">
                                                <span class="ve-time">{visit.time}</span>
                                            </div>

                                            <!-- Account -->
                                            <div class="ve-col ve-col-account">
                                                <div class="ve-account-avatar">{visit.accountInitial}</div>
                                                <div class="ve-account-info">
                                                    <div class="ve-account-name">{visit.account}</div>
                                                    <div class="ve-account-location">{visit.location}</div>
                                                </div>
                                            </div>

                                            <!-- Purpose -->
                                            <div class="ve-col ve-col-purpose">
                                                <span class="ve-purpose">{visit.purpose}</span>
                                            </div>

                                            <!-- Status -->
                                            <div class="ve-col ve-col-status">
                                                <span class={visit.statusClass}>{visit.status}</span>
                                            </div>

                                            <!-- Action buttons -->
                                            <div class="ve-col ve-col-action">
                                                <!-- Check In (Planned / Scheduled) -->
                                                <template if:true={visit.canCheckIn}>
                                                    <button
                                            class="ve-checkin-btn"
                                            data-id={visit.id}
                                            data-account={visit.account}
                                            onclick={handleVisitCheckIn}
                                            disabled={visit.isCheckingIn}>
                                            <template if:true={visit.isCheckingIn}>
                                                <span class="ve-spinner"></span> Locating…
                                            </template>
                                            <template if:false={visit.isCheckingIn}>
                                                ✓ Check In
                                            </template>
                                        </button>
                                                </template>

                                                <!-- Resume (In Progress — navigate back to detail view) -->
                                                <template if:true={visit.isInProgress}>
                                                    <button
                                            class="ve-checkin-btn ve-checkin-btn--resume"
                                            data-id={visit.id}
                                            onclick={handleResumeVisit}>
                                            ▶ Resume
                                        </button>
                                                </template>

                                                <!-- Completed -->
                                                <template if:true={visit.isCompleted}>
                                                    <span class="ve-done-label">✓ Completed</span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <!-- Recent Visit History -->
                        <div class="bottom-card priority-card" style="margin-top:20px;">
                            <div class="card-header">
                                <h3>📍 Recent Visit History</h3>
                                <button class="view-all-btn" onclick={handleViewAllVisits}>View All →</button>
                            </div>
                            <div class="priority-list">
                                <template for:each={recentVisits} for:item="visit">
                                    <div key={visit.id} class="priority-account">
                                        <div class="account-info">
                                            <div class="account-name">{visit.account}</div>
                                            <div class="account-location">{visit.time}</div>
                                        </div>
                                        <div class={visit.statusClass}>{visit.status}</div>
                                    </div>
                                </template>
                            </div>
                        </div>

                    </div><!-- end visit-execution-container -->
                </template>

            </template>


            <!-- New Account  Tab Content-->
            <template if:true={isNewAccountActive}>
                <div class="account-onboarding-container">
                    <!-- Header Section -->
                    <div class="onboarding-header">
                        <div class="header-content">
                            <h1>Account Onboarding</h1>
                            <p class="subtitle">Add new dealer or customer account</p>
                        </div>
                    </div>

                    <!-- Main Content Area -->
                    <div class="onboarding-content">
                        <!-- Form Section -->
                        <div class="onboarding-form-section">
                            <div class="form-header">
                                <h2>Create Account Form</h2>
                                <p class="form-subtitle">Fill in the details to create a new account</p>
                            </div>

                            <!-- Success State -->
                            <template if:true={showSuccessState}>
                                <div class="success-state">
                                    <div class="success-animation">
                                        <div class="checkmark-container">
                                            <div class="checkmark">✓</div>
                                        </div>
                                        <div class="success-title">Account created successfully!</div>
                                        <div class="success-message">The account is pending approval.</div>
                                        <div class="success-actions">
                                            <button type="button" class="success-action-btn" onclick={createAnotherAccount}>
                                    Create Another Account
                                </button>
                                            <button type="button" class="success-action-btn secondary" onclick={goToAccountDashboard}>
                                    Go to Account Dashboard
                                </button>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <!-- Form - Show when not in success state -->
                            <template if:true={showForm}>
                                <form class="account-form" onsubmit={handleSubmit}>
                                    <!-- Business Information Section -->
                                    <div class="form-section">
                                        <h3 class="section-title">Business Information</h3>
                                        <div class="form-grid">
                                            <div class="form-group full-width">
                                                <label for="businessName">Business Name <span class="required">*</span></label>
                                                <input
                                        type="text"
                                        id="businessName"
                                        name="businessName"
                                        class="form-input"
                                        placeholder="Enter business name"
                                        required
                                        value={formData.businessName}
                                        onchange={handleInputChange}
                                    />
                                                <div class="error-message" if:true={errors.businessName}>
                                                    {errors.businessName}
                                                </div>
                                            </div>

                                            <div class="form-group">
                                                <label for="accountType">Account Type <span class="required">*</span></label>
                                                <select
                                        id="accountType"
                                        name="accountType"
                                        class="form-select"
                                        required
                                        value={formData.accountType}
                                        onchange={handleInputChange}
                                    >
                                        <option value="">Select account type</option>
                                        <option value="dealer">Dealer</option>
                                        <option value="customer">Customer</option>
                                    </select>
                                                <div class="error-message" if:true={errors.accountType}>
                                                    {errors.accountType}
                                                </div>
                                            </div>

                                            <div class="form-group">
                                                <label for="gstin">GSTIN</label>
                                                <input
                                        type="text"
                                        id="gstin"
                                        name="gstin"
                                        class="form-input"
                                        placeholder="22AAAAA0000A1Z5"
                                        value={formData.gstin}
                                        onchange={handleInputChange}
                                    />
                                                <div class="form-hint">(Optional – recommended for dealers)</div>
                                                <div class="error-message" if:true={errors.gstin}>
                                                    {errors.gstin}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Contact Information Section -->
                                    <div class="form-section">
                                        <h3 class="section-title">Contact Information</h3>
                                        <div class="form-grid">
                                            <div class="form-group full-width">
                                                <label for="contactPerson">Contact Person <span class="required">*</span></label>
                                                <input
                                        type="text"
                                        id="contactPerson"
                                        name="contactPerson"
                                        class="form-input"
                                        placeholder="Enter contact name"
                                        required
                                        value={formData.contactPerson}
                                        onchange={handleInputChange}
                                    />
                                                <div class="error-message" if:true={errors.contactPerson}>
                                                    {errors.contactPerson}
                                                </div>
                                            </div>

                                            <div class="form-group">
                                                <label for="phoneNumber">Phone Number <span class="required">*</span></label>
                                                <input
                                        type="tel"
                                        id="phoneNumber"
                                        name="phoneNumber"
                                        class="form-input"
                                        placeholder="+91-9876543210"
                                        required
                                        value={formData.phoneNumber}
                                        onchange={handleInputChange}
                                    />
                                                <div class="error-message" if:true={errors.phoneNumber}>
                                                    {errors.phoneNumber}
                                                </div>
                                            </div>

                                            <div class="form-group">
                                                <label for="email">Email</label>
                                                <input
                                        type="email"
                                        id="email"
                                        name="email"
                                        class="form-input"
                                        placeholder="email@example.com"
                                        value={formData.email}
                                        onchange={handleInputChange}
                                    />
                                                <div class="error-message" if:true={errors.email}>
                                                    {errors.email}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Address Information Section -->
                                    <div class="form-section">
                                        <h3 class="section-title">Address Information</h3>
                                        <div class="form-grid">
                                            <div class="form-group full-width">
                                                <label for="streetAddress">Street Address <span class="required">*</span></label>
                                                <textarea
                                        id="streetAddress"
                                        name="streetAddress"
                                        class="form-textarea"
                                        placeholder="Enter complete address"
                                        required
                                        value={formData.streetAddress}
                                        onchange={handleInputChange}
                                        rows="3"
                                    ></textarea>
                                                <div class="error-message" if:true={errors.streetAddress}>
                                                    {errors.streetAddress}
                                                </div>
                                            </div>

                                            <div class="form-group">
                                                <label for="city">City <span class="required">*</span></label>
                                                <input
                                        type="text"

                </div>

                <!-- List -->
                <div class="modal-content" style="display:block; padding: 8px 24px 16px;">

                    <template if:false={filteredVisits.length}>
                        <div class="ve-empty" style="padding:32px;">
                            <div class="ve-empty-icon">📋</div>
                            <div class="ve-empty-title">No visits found for this period</div>
                        </div>
                    </template>

                    <div class="attendance-list">
                        <template for:each={filteredVisits} for:item="visit">
                            <div key={visit.id} class="attendance-item vhf-clickable-row" data-id={visit.id}
                                onclick={handleVisitHistoryItemClick}>

                                <!-- Date Column -->
                                <div class="attendance-date">
                                    <div class="day">{visit.dayLabel}</div>
                                    <div class="date">{visit.dateDisplay}</div>
                                </div>

                                <!-- Account + Time -->
                                <div class="attendance-times">
                                    <div class="time-entry">
                                        <span class="time-label">Account:</span>
                                        <span class="time-value">{visit.account}</span>
                                    </div>
                                    <div class="time-entry">
                                        <span class="time-label">Time:</span>
                                        <span class="time-value">{visit.time}</span>
                                    </div>
                                </div>

                                <!-- Status -->
                                <div class={visit.statusClass}>{visit.status}</div>

                                <!-- Arrow indicator -->
                                <div class="vhf-arrow">→</div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Footer -->
                <div class="modal-footer">
                    <button class="secondary-btn" onclick={closeVisitHistoryModal}>Close</button>
                </div>

            </div>
        </div>
    </template>

    <template if:true={showScheduleVisitModal}>
        <div class="modal-overlay" onclick={closeScheduleVisitModal}>
            <div class="attendance-modal" onclick={handleModalClick}>

                <div class="modal-header">
                    <h2>📅 Schedule Visit</h2>
                    <button class="modal-close" onclick={closeScheduleVisitModal}>×</button>
                </div>

                <div class="modal-content" style="grid-template-columns: 1fr;">
                    <lightning-record-edit-form object-api-name="Visit__c" onsuccess={handleSuccess}
                        onerror={handleError}>

                        <lightning-messages></lightning-messages>

                        <lightning-input-field field-name="Account__c">
                        </lightning-input-field>

                        <lightning-input-field field-name="Visit_Date__c">
                        </lightning-input-field>

                        <lightning-input-field field-name="Planned_Start_Time__c">
                        </lightning-input-field>

                        <lightning-input-field field-name="Visit_Purpose__c">
                        </lightning-input-field>

                        <lightning-input-field field-name="Visit_Status__c">
                        </lightning-input-field>

                        <div class="slds-m-top_medium">
                            <lightning-button type="submit" label="Create Visit" variant="brand">
                            </lightning-button>
                        </div>

                    </lightning-record-edit-form>
                </div>
            </div>
        </div>
    </template>

</template>
