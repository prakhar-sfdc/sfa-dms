<template>
    <div class="expenses-container">
        <!-- Header -->
        <div class="expense-header">
            <div class="header-left">
                <h1>Expense Management</h1>
                <p class="subtitle">Track and manage your expenses</p>
            </div>
            <div class="header-right">
                <button class="primary-btn expense-submit-btn" onclick={handleSubmitExpense}>
                    Submit Expense
                </button>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card">
                <div class="summary-icon">💰</div>
                <div class="summary-content">
                    <h3>Total Expenses</h3>
                    <div class="summary-value">{totalAmountDisplay}</div>
                    <div class="summary-trend">All time total</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">✅</div>
                <div class="summary-content">
                    <h3>Approved</h3>
                    <div class="summary-value">{expenseSummary.approvedCount}</div>
                    <div class="summary-trend">Expenses approved</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">⏳</div>
                <div class="summary-content">
                    <h3>Pending</h3>
                    <div class="summary-value">{expenseSummary.pendingCount}</div>
                    <div class="summary-trend">Awaiting approval</div>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">📋</div>
                <div class="summary-content">
                    <h3>Submissions</h3>
                    <div class="summary-value">{expenseSummary.totalSubmissions}</div>
                    <div class="summary-trend">Total submitted</div>
                </div>
            </div>
        </div>

        <!-- Budget spend meter (signature) -->
        <div class="meter-card">
            <div class="card-header">
                <h3>Budget &amp; spend breakdown</h3>
                <div class={budgetStatusClass}>{budget.status}</div>
            </div>

            <div class="meter-figures">
                <div class="meter-figure">
                    <span class="meter-figure-value">{budgetUsedDisplay}</span>
                    <span class="meter-figure-label">Spent</span>
                </div>
                <span class="meter-sep">/</span>
                <div class="meter-figure">
                    <span class="meter-figure-value muted">{budgetTotalDisplay}</span>
                    <span class="meter-figure-label">Budget</span>
                </div>
                <div class="meter-figure meter-figure--right">
                    <span class="meter-figure-value">{budgetRemainingDisplay}</span>
                    <span class="meter-figure-label">Remaining</span>
                </div>
            </div>

            <div class="meter-track">
                <template for:each={spendSegments} for:item="seg">
                    <div key={seg.key} class="meter-seg" style={seg.style} title={seg.title}></div>
                </template>
                <div class="meter-seg meter-seg--empty" style={emptySpendStyle}></div>
            </div>
            <div class="meter-caption">{budgetPercentageText}</div>

            <template if:true={hasSpend}>
                <div class="meter-legend">
                    <template for:each={spendChips} for:item="chip">
                        <div key={chip.key} class="meter-chip">
                            <span class="meter-dot" style={chip.dotStyle}></span>
                            <span class="meter-chip-label">{chip.label}</span>
                            <span class="meter-chip-amt">{chip.amountDisplay}</span>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- Recent Expenses Table -->
        <div class="recent-expenses-card">
            <div class="card-header">
                <h3>📋 Recent Expenses</h3>
                <button class="view-all-btn" onclick={viewAllExpenses}>View All →</button>
            </div>
            <div class="expenses-table">
                <div class="table-header">
                    <div class="table-cell">Date</div>
                    <div class="table-cell">Type</div>
                    <div class="table-cell">Description</div>
                    <div class="table-cell">Amount</div>
                    <div class="table-cell">Status</div>
                    <div class="table-cell">Action</div>
                </div>
                <div class="table-body">
                    <template for:each={recentExpensesList} for:item="expense">
                        <div key={expense.id} class="table-row">
                            <div class="table-cell">{expense.formattedDate}</div>
                            <div class="table-cell type-cell">
                                <span class="type-dot" style={expense.typeDotStyle}></span>
                                <span class="type-name">{expense.type}</span>
                            </div>
                            <div class="table-cell">{expense.description}</div>
                            <div class="table-cell amount-cell">{expense.amountDisplay}</div>
                            <div class="table-cell"><span class={expense.statusClass}>{expense.status}</span></div>
                            <div class="table-cell">
                                <button class="row-view-btn" onclick={handleViewExpenseDetails} data-id={expense.id} title="View details">
                                    <svg viewBox="0 0 24 24" class="row-view-icon" aria-hidden="true">
                                        <path d="M12 5c-5 0-8.5 4.5-9.5 7 1 2.5 4.5 7 9.5 7s8.5-4.5 9.5-7c-1-2.5-4.5-7-9.5-7Z" fill="none" stroke="currentColor" stroke-width="1.7"></path>
                                        <circle cx="12" cy="12" r="2.6" fill="none" stroke="currentColor" stroke-width="1.7"></circle>
                                    </svg>
                                    <span>View</span>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Mobile card layout (hidden on desktop via CSS) -->
            <div class="expense-cards-mobile">
                <template for:each={recentExpensesList} for:item="expense">
                    <div key={expense.id} class="expense-card-mobile">
                        <div class="expense-card-top">
                            <span class={expense.typeBadgeClass}>{expense.type}</span>
                            <span class={expense.statusClass}>{expense.status}</span>
                        </div>
                        <div class="expense-card-mid">
                            <span class="exp-desc">{expense.description}</span>
                            <span class="exp-amount">{expense.amountDisplay}</span>
                        </div>
                        <div class="expense-card-bot">
                            <span class="exp-date">{expense.formattedDate}</span>
                        </div>
                        <button class="card-view-btn" onclick={handleViewExpenseDetails} data-id={expense.id}>
                            <svg viewBox="0 0 24 24" class="row-view-icon" aria-hidden="true">
                                <path d="M12 5c-5 0-8.5 4.5-9.5 7 1 2.5 4.5 7 9.5 7s8.5-4.5 9.5-7c-1-2.5-4.5-7-9.5-7Z" fill="none" stroke="currentColor" stroke-width="1.7"></path>
                                <circle cx="12" cy="12" r="2.6" fill="none" stroke="currentColor" stroke-width="1.7"></circle>
                            </svg>
                            <span>View details</span>
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Submit Expense Modal -->
    <template if:true={showExpenseSubmitModal}>
        <div class="modal-overlay" onclick={closeExpenseSubmitModal}>
            <div class="expense-modal" onclick={handleModalClick}>
                <div class="modal-header">
                    <h2>💰 New Reimbursement</h2>
                    <button class="modal-close" onclick={closeExpenseSubmitModal}>×</button>
                </div>
                <div class="modal-body">

                    <!-- Source mode toggle -->
                    <div class="field-block">
                        <label class="field-label">Entry Mode</label>
                        <div class="mode-toggle">
                            <button class={sourceManualClass} onclick={setSourceManual}>✏️ Manual</button>
                            <button class={sourceAutoClass} onclick={setSourceAuto}>📍 Auto (GPS)</button>
                        </div>
                        <p class="field-hint">Auto pulls today’s tracked distance from your Journey Plan.</p>
                    </div>

                    <!-- Category chips -->
                    <div class="field-block">
                        <label class="field-label">Category</label>
                        <div class="category-grid">
                            <template for:each={categoryOptions} for:item="cat">
                                <button key={cat.value} class={cat.cssClass} data-value={cat.value} onclick={selectCategory}>
                                    <span class="chip-icon">{cat.icon}</span>
                                    <span class="chip-label">{cat.label}</span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Mileage block -->
                    <template if:true={isMileage}>
                        <div class="form-grid">
                            <div>
                                <label class="field-label">Vehicle Type</label>
                                <lightning-combobox variant="label-hidden" placeholder="Select vehicle"
                                    value={form.vehicleType} options={vehicleOptions}
                                    onchange={handleVehicleChange}></lightning-combobox>
                            </div>
                            <div>
                                <label class="field-label">Kilometers Driven</label>
                                <lightning-input type="number" variant="label-hidden" data-field="distance"
                                    value={form.distance} onchange={handleFieldChange} min="0" step="0.1"
                                    placeholder="0"></lightning-input>
                            </div>
                            <div>
                                <label class="field-label">From</label>
                                <lightning-input type="text" variant="label-hidden" data-field="fromLocation"
                                    value={form.fromLocation} onchange={handleFieldChange} placeholder="Start point"></lightning-input>
                            </div>
                            <div>
                                <label class="field-label">To</label>
                                <lightning-input type="text" variant="label-hidden" data-field="toLocation"
                                    value={form.toLocation} onchange={handleFieldChange} placeholder="Destination"></lightning-input>
                            </div>
                        </div>
                        <div class="calc-row">
                            <span class="calc-formula">{mileageBreakdown}</span>
                            <span class="calc-amount">{amountDisplay}</span>
                        </div>
                    </template>

                    <!-- Daily Allowance block -->
                    <template if:true={isDailyAllowance}>
                        <div class="form-grid">
                            <div>
                                <label class="field-label">Number of Days</label>
                                <lightning-input type="number" variant="label-hidden" data-field="days"
                                    value={form.days} onchange={handleFieldChange} min="1" step="1"></lightning-input>
                            </div>
                        </div>
                        <div class="calc-row">
                            <span class="calc-formula">{dailyAllowanceBreakdown}</span>
                            <span class="calc-amount">{amountDisplay}</span>
                        </div>
                    </template>

                    <!-- Manual amount block -->
                    <template if:true={isAmountManual}>
                        <div class="form-grid">
                            <div>
                                <label class="field-label">Amount (₹)</label>
                                <lightning-input type="number" variant="label-hidden" data-field="amount"
                                    value={form.amount} onchange={handleFieldChange} min="0" step="1"
                                    placeholder="0"></lightning-input>
                            </div>
                        </div>
                        <template if:true={dailyCapWarning}>
                            <p class="cap-warning">⚠️ {dailyCapWarning}</p>
                        </template>
                    </template>

                    <!-- Common fields -->
                    <div class="form-grid">
                        <div>
                            <label class="field-label">Date</label>
                            <lightning-input type="date" variant="label-hidden" data-field="expenseDate"
                                value={form.expenseDate} onchange={handleFieldChange}></lightning-input>
                        </div>
                        <div>
                            <label class="field-label">City</label>
                            <lightning-input type="text" variant="label-hidden" data-field="city"
                                value={form.city} onchange={handleFieldChange} placeholder="City"></lightning-input>
                        </div>
                        <div class="full-col">
                            <label class="field-label">Description</label>
                            <lightning-input type="text" variant="label-hidden" data-field="description"
                                value={form.description} onchange={handleFieldChange}
                                placeholder="What was this for?"></lightning-input>
                        </div>
                    </div>

                    <!-- Receipts -->
                    <div class="field-block">
                        <label class="field-label">
                            Receipts
                            <template if:true={requiresReceipt}><span class="req-star">*</span></template>
                        </label>
                        <input type="file" class="receipt-input" accept="image/*"
                            multiple onchange={handleReceiptChange} />
                        <button class="receipt-add-btn" onclick={triggerReceiptPicker}>📷 Add Receipt</button>
                        <span class="receipt-count">{receiptCountLabel}</span>
                        <template if:true={receiptRequiredHint}>
                            <p class="field-hint receipt-hint">A receipt is required to submit this category.</p>
                        </template>
                        <div class="receipt-grid">
                            <template for:each={receiptFiles} for:item="rf">
                                <div key={rf.key} class="receipt-thumb">
                                    <template if:true={rf.isImage}>
                                        <img src={rf.dataUrl} alt={rf.name} />
                                    </template>
                                    <template if:false={rf.isImage}>
                                        <span class="receipt-file">📄</span>
                                    </template>
                                    <button class="receipt-remove" data-key={rf.key} onclick={removeReceipt}>×</button>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Budget indicator -->
                    <div class="budget-inline">
                        <span>Remaining budget: <strong>{remainingBudgetDisplay}</strong></span>
                        <template if:true={overBudget}>
                            <span class="over-budget-flag">Over budget</span>
                        </template>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="secondary-btn" onclick={closeExpenseSubmitModal} disabled={isSaving}>Cancel</button>
                    <button class="secondary-btn" onclick={handleSaveDraft} disabled={isSaving}>Save Draft</button>
                    <button class="primary-btn" onclick={handleSubmitForm} disabled={submitDisabled}>
                        <template if:true={isSaving}>Saving…</template>
                        <template if:false={isSaving}>Submit</template>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- Expense Detail Sheet -->
    <template if:true={showExpenseModal}>
        <div class="modal-overlay" onclick={closeExpenseModal}>
            <div class="expense-modal expense-modal--sheet" onclick={handleModalClick}>
                <div class="modal-header">
                    <h2>Expense detail</h2>
                    <button class="modal-close" onclick={closeExpenseModal}>×</button>
                </div>
                <div class="modal-body">

                    <!-- Hero: amount + pills -->
                    <div class="sheet-hero">
                        <div class="sheet-amount">{selectedExpense.amountDisplay}</div>
                        <div class="sheet-pills">
                            <span class={selectedExpense.statusClass}>{selectedExpense.status}</span>
                            <span class="sheet-type"><span class="type-dot" style={selectedExpense.typeDotStyle}></span>{selectedExpense.type}</span>
                            <span class={selectedExpense.sourceBadgeClass}>{selectedExpense.source}</span>
                        </div>
                    </div>

                    <!-- Key facts -->
                    <div class="sheet-facts">
                        <div class="sheet-fact"><span class="sheet-fact-label">Date</span><span class="sheet-fact-value">{selectedExpense.formattedDate}</span></div>
                        <div class="sheet-fact"><span class="sheet-fact-label">City</span><span class="sheet-fact-value">{selectedExpense.city}</span></div>
                        <div class="sheet-fact"><span class="sheet-fact-label">Submitted</span><span class="sheet-fact-value">{selectedExpense.submittedOn}</span></div>
                        <div class="sheet-fact"><span class="sheet-fact-label">Approved</span><span class="sheet-fact-value">{selectedExpense.approvedOn}</span></div>
                    </div>

                    <!-- Trip section (mileage only) -->
                    <template if:true={selectedExpense.isMileage}>
                        <div class="sheet-section">
                            <div class="sheet-section-title">Trip</div>
                            <div class="trip-route">
                                <span class="trip-loc">{selectedExpense.fromLocation}</span>
                                <span class="trip-arrow">→</span>
                                <span class="trip-loc">{selectedExpense.toLocation}</span>
                            </div>
                            <div class="sheet-facts">
                                <div class="sheet-fact"><span class="sheet-fact-label">Distance</span><span class="sheet-fact-value">{selectedExpense.distance} km</span></div>
                                <div class="sheet-fact"><span class="sheet-fact-label">Vehicle</span><span class="sheet-fact-value">{selectedExpense.vehicleType}</span></div>
                                <div class="sheet-fact sheet-fact--wide"><span class="sheet-fact-label">Rate</span><span class="sheet-fact-value">{selectedExpense.mileageBreakdown}</span></div>
                            </div>
                        </div>
                    </template>

                    <!-- Description -->
                    <div class="sheet-section">
                        <div class="sheet-section-title">Description</div>
                        <p class="sheet-desc">{selectedExpense.description}</p>
                    </div>

                    <!-- Receipts -->
                    <div class="sheet-section">
                        <div class="sheet-section-title">Receipts</div>
                        <template if:true={receiptsLoading}>
                            <p class="sheet-muted">Loading receipts…</p>
                        </template>
                        <template if:false={receiptsLoading}>
                            <template if:true={detailHasReceipts}>
                                <div class="sheet-receipts">
                                    <template for:each={selectedReceipts} for:item="rc">
                                        <a key={rc.key} href={rc.url} target="_blank" class="sheet-receipt" title={rc.title}>
                                            <template if:true={rc.isImage}>
                                                <img src={rc.url} alt={rc.title} />
                                            </template>
                                            <template if:false={rc.isImage}>
                                                <span class="sheet-receipt-file">📄<span>{rc.fileType}</span></span>
                                            </template>
                                        </a>
                                    </template>
                                </div>
                            </template>
                            <template if:false={detailHasReceipts}>
                                <p class="sheet-muted">No receipts attached.</p>
                            </template>
                        </template>
                    </div>

                    <!-- Rejection note -->
                    <template if:true={selectedExpense.isRejected}>
                        <div class="sheet-reject">
                            <span class="sheet-reject-title">Rejected</span>
                            <span class="sheet-reject-reason">{selectedExpense.rejectionReason}</span>
                        </div>
                    </template>
                </div>
                <div class="modal-footer">
                    <button class="secondary-btn" onclick={closeExpenseModal}>Close</button>
                </div>
            </div>
        </div>
    </template>
</template>
